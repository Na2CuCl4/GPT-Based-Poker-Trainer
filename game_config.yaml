game:
  mode: cash # cash | tournament

table:
  num_opponents: 5 # 2-5
  starting_chips: 2000
  max_chips: 4000 # cashout upper bound; default = 2×starting_chips if omitted

blinds:
  small_blind: 10
  big_blind: 20
  ante: 0 # 0 = no ante

ai:
  model: "gpt-5.4"
  base_url: "<your-gpt-base-url>"
  api_key: "<your-gpt-api-key>"
  response_delay: 0 # AI response delay (seconds)
  action_timeout: 30 # AI action / RIT decision timeout (seconds)
  hint_timeout: 20 # hint / RIT hint timeout (seconds)
  analysis_timeout: 60 # post-hand analysis timeout (seconds)
  pricing:
    input: 2.5    # USD per million tokens
    cached: 0.25
    output: 15.0

training:
  hint_enabled: true
  post_hand_analysis: true
  show_opponent_styles: true # true: show opponent style info; false: hide styles
  # random | tight_aggressive | loose_aggressive | tight_passive | loose_passive | balanced
  opponent_styles:
    - random

features:
  run_it_twice: true # true: offer run-it-twice when all-in; false: disable
  four_color_deck: true # true: green clubs + blue diamonds; false: traditional two-color (red/black)

# Auth: passwords are now managed via `python auth.py`
# (passwords.json in project root, gitignored)
